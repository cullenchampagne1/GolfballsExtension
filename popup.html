<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Golfballs Templates</title>
<script src="theme-init.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 320px;
    min-height: 340px;
    margin: 0; padding: 0;
    background: #0e0f10;            /* matches --gb-surface-canvas; theme tokens take over once popup.js mounts */
    color: rgba(255,255,255,.8);
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  #popup-root { width: 320px; min-height: 340px; position: relative; }
</style>
</head>
<body>
  <div id="popup-root"></div>
  <script src="react-dist/popup/popup.js"></script>
</body>
</html>
