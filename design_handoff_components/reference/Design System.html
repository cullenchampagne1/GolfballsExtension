<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golfballs · Design System</title>
<link rel="stylesheet" href="system-tokens.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--gb-font-sans);
    background: var(--gb-surface-canvas);
    color: var(--gb-text-secondary);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background .2s ease, color .2s ease;
  }
  @keyframes gb-spin { to { transform: rotate(360deg); } }
  /* Toast keyframes */
  @keyframes gb-toast-in-top    { from { opacity: 0; transform: translateY(-24px) scale(.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes gb-toast-in-right  { from { opacity: 0; transform: translateX(40px) scale(.96); } to { opacity: 1; transform: translateX(0) scale(1); } }
  @keyframes gb-toast-in-left   { from { opacity: 0; transform: translateX(-40px) scale(.96); } to { opacity: 1; transform: translateX(0) scale(1); } }
  @keyframes gb-toast-progress  { from { width: 100%; } to { width: 0%; } }
  ::selection {
    background: var(--gb-brand-tint-medium);
    color: var(--gb-brand-label);
  }
  /* Theming transition smoothing */
  body * {
    transition: background-color .18s ease, border-color .18s ease, color .18s ease, box-shadow .18s ease;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="system-primitives.jsx"></script>
<script type="text/babel" src="system-page.jsx"></script>
</body>
</html>
